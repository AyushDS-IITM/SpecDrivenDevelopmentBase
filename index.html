<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Todo App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="todo-panel" aria-labelledby="app-title">
      <h1 id="app-title">Simple Todo App</h1>
      <p class="intro">Add tasks, mark them complete, and delete them when you are done.</p>

      <form id="todo-form" class="todo-form">
        <label for="todo-input">New todo</label>
        <div class="input-row">
          <input id="todo-input" type="text" placeholder="Example: Buy groceries" autocomplete="off">
          <button type="submit">Add</button>
        </div>
      </form>

      <ul id="todo-list" class="todo-list" aria-label="Todo list"></ul>
      <p id="empty-message" class="empty-message">No todos yet. Add one above.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
